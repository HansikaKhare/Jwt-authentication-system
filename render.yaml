services:
  # Backend Service (Spring Boot API)
  - type: web
    name: jwt-auth-backend
    env: java
    region: oregon
    plan: free
    
    buildCommand: cd backend && ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: jwt-auth-db
          property: connectionString
      - key: cors.allowed.origins
        value: "*"

databases:
  - name: jwt-auth-db
    databaseName: jwt_auth_db
    diskSizeGB: 1
    plan: free
